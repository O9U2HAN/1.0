<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rüya Yorumları</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d14;
    --bg2: #13131f;
    --bg3: #1a1a2e;
    --accent: #9b7fe8;
    --accent2: #c9a96e;
    --text: #e8e4f0;
    --text-muted: #7a7490;
    --bubble-user: #1e1b35;
    --bubble-ai: #161525;
    --border: #2a2640;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(155,127,232,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(201,169,110,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(155,127,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(201,169,110,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(155,127,232,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 90%, rgba(201,169,110,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 20%, rgba(155,127,232,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d1f5e, #4a3580);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .header-info .status {
    font-size: 12px;
    color: #6bcb77;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Crimson Text', serif;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6bcb77;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    transition: all 0.2s;
  }

  .clear-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeIn 0.8s ease;
  }

  .welcome .moon {
    font-size: 52px;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 20px rgba(155,127,232,0.5));
  }

  .welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent2);
    margin-bottom: 10px;
    font-style: italic;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.7;
    max-width: 280px;
    margin: 0 auto;
  }

  .message {
    display: flex;
    gap: 10px;
    animation: slideUp 0.3s ease;
    max-width: 100%;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .message.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.ai .msg-avatar {
    background: linear-gradient(135deg, #2d1f5e, #4a3580);
    border: 1.5px solid var(--accent);
  }

  .message.user .msg-avatar {
    background: var(--bg3);
    border: 1.5px solid var(--border);
  }

  .msg-content {
    max-width: calc(100% - 50px);
  }

  .msg-name {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-family: 'Crimson Text', serif;
  }

  .message.user .msg-name {
    text-align: right;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.7;
    font-size: 16px;
  }

  .message.ai .msg-bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .msg-bubble {
    background: var(--bubble-user);
    border: 1px solid #2e2850;
    border-top-right-radius: 4px;
    color: var(--text);
    text-align: right;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'Crimson Text', serif;
  }

  .message.user .msg-time {
    text-align: right;
  }

  .typing-indicator {
    display: flex;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  .typing-bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-top-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    position: sticky;
    bottom: 0;
    z-index: 100;
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }

  textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #7b5fd4);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(155,127,232,0.3);
  }

  .send-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 20px rgba(155,127,232,0.5);
  }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 360px;
    animation: fadeIn 0.3s ease;
  }

  .modal .moon-big {
    font-size: 44px;
    text-align: center;
    display: block;
    margin-bottom: 16px;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent2);
    text-align: center;
    margin-bottom: 8px;
    font-style: italic;
  }

  .modal p {
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Crimson Text', serif;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .modal input:focus {
    border-color: var(--accent);
  }

  .modal input::placeholder {
    color: var(--text-muted);
  }

  .modal-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #7b5fd4);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-btn:hover { opacity: 0.9; }

  .error-msg {
    color: #e07070;
    font-size: 13px;
    text-align: center;
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>

<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <span class="moon-big">🌙</span>
    <h2>Rüya Yorumları</h2>
    <p>Başlamak için Gemini API anahtarınızı girin. Bu bilgi yalnızca cihazınızda saklanır.</p>
    <input type="password" id="apiKeyInput" placeholder="AIza... API anahtarınız" />
    <button class="modal-btn" onclick="saveApiKey()">Devam Et</button>
    <p class="error-msg" id="apiError">Geçersiz anahtar, lütfen tekrar deneyin.</p>
  </div>
</div>

<div class="header">
  <div class="header-left">
    <div class="avatar">🔮</div>
    <div class="header-info">
      <h1>Leyla Hanım</h1>
      <div class="status">
        <span class="status-dot"></span>
        Çevrimiçi
      </div>
    </div>
  </div>
  <button class="clear-btn" onclick="clearChat()">Temizle</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeMsg">
    <span class="moon">🌙</span>
    <h2>Hoş geldiniz</h2>
    <p>Rüyanızı benimle paylaşın, birlikte anlamlandıralım...</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Rüyanızı buraya yazın..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const SYSTEM_PROMPT = `Sen "Leyla Hanım" adında deneyimli ve mistik bir rüya yorumcususun. Yıllarca rüya yorumu yapıyorsun. İnsanlara sıcak, anlayışlı ve bilge bir şekilde yaklaşıyorsun. Türkçe konuşuyorsun.

Rüyaları yorumlarken:
- Semboller ve anlamları üzerinden yorumlama yap
- Psikolojik ve geleneksel yorumları harmanlıyorsun
- Kişisel ve samimi bir dil kullanıyorsun
- Kesinlikle "yapay zeka", "AI", "asistan" gibi kavramlardan bahsetmiyorsun
- Sanki gerçek bir rüya yorumcusu gibi davranıyorsun
- Cevapların 3-5 cümle arasında olsun, çok uzatma
- Bazen "Bu rüyan çok ilginç..." veya "Bunu daha önce de gördüm..." gibi insani ifadeler kullan`;

  let messages = [];
  let apiKey = localStorage.getItem('gemini_key') || '';

  window.onload = () => {
    if (apiKey) {
      document.getElementById('apiModal').style.display = 'none';
    }
    loadHistory();
  };

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key.startsWith('AIza') || key.length < 20) {
      document.getElementById('apiError').style.display = 'block';
      return;
    }
    apiKey = key;
    localStorage.setItem('gemini_key', key);
    document.getElementById('apiModal').style.display = 'none';
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function getTime() {
    return new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text) {
    const chatArea = document.getElementById('chatArea');
    const welcome = document.getElementById('welcomeMsg');
    if (welcome) welcome.remove();

    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'ai'}`;

    div.innerHTML = `
      <div class="msg-avatar">${isUser ? '👤' : '🔮'}</div>
      <div class="msg-content">
        <div class="msg-name">${isUser ? 'Siz' : 'Leyla Hanım'}</div>
        <div class="msg-bubble">${text}</div>
        <div class="msg-time">${getTime()}</div>
      </div>
    `;

    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="msg-avatar" style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2d1f5e,#4a3580);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🔮</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || !apiKey) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    messages.push({ role: 'user', parts: [{ text }] });

    showTyping();

    try {
      // Güncel gemini-2.5-flash modeline yönlendirildi
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: messages
          })
        }
      );

      const data = await response.json();

      if (data.error) {
        removeTyping();
        addMessage('ai', 'Bir sorun oluştu, lütfen tekrar deneyin.');
        document.getElementById('sendBtn').disabled = false;
        return;
      }

      const reply = data.candidates[0].content.parts[0].text;
      messages.push({ role: 'model', parts: [{ text: reply }] });
      saveHistory();

      removeTyping();
      addMessage('ai', reply);

    } catch (e) {
      removeTyping();
      addMessage('ai', 'Bağlantı hatası, lütfen internet bağlantınızı kontrol edin.');
    }

    document.getElementById('sendBtn').disabled = false;
  }

  function clearChat() {
    messages = [];
    localStorage.removeItem('chat_history');
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML = `
      <div class="welcome" id="welcomeMsg">
        <span class="moon">🌙</span>
        <h2>Hoş geldiniz</h2>
        <p>Rüyanızı benimle paylaşın, birlikte anlamlandıralım...</p>
      </div>
    `;
  }

  function saveHistory() {
    localStorage.setItem('chat_history', JSON.stringify(messages));
  }

  function loadHistory() {
    const saved = localStorage.getItem('chat_history');
    if (!saved) return;
    try {
      const history = JSON.parse(saved);
      if (!history.length) return;
      messages = history;
      history.forEach(m => {
        addMessage(m.role === 'user' ? 'user' : 'ai', m.parts[0].text);
      });
    } catch(e) {}
  }
</script>
</body>
</html>
